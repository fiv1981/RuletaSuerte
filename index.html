<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ruleta de la Suerte</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ruleta de la Suerte" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar glass">
      <div class="brand-wrap">
        <img src="icon.svg" alt="Ruleta de la Suerte" class="brand-icon" />
        <div>
          <h1>Ruleta de la Suerte</h1>
        </div>
      </div>
      <div class="top-actions">
        <div class="stat-pill">
          <span class="stat-pill__label">Puntos</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div class="stat-pill">
          <span class="stat-pill__label">Vidas</span>
          <strong id="lifeValue">3</strong>
        </div>
        <button id="resetBtn" class="top-reset-btn">Reiniciar</button>
      </div>
    </header>

    <section class="playfield">
      <section class="panel-stage glass">
        <div class="panel-head">
          <div id="phraseCategory" class="category-chip">Películas</div>
          <div id="resultLabel" class="result-inline">Pulsa Girar para comenzar</div>
        </div>
        <div id="phraseBoard" class="phrase-board"></div>
        <div class="panel-footer panel-footer--single">
          <div>
            <p class="eyebrow">Estado</p>
            <p id="resultHint" class="panel-hint">Gira la ruleta, elige letra desde el teclado del juego y resuelve el panel.</p>
          </div>
        </div>
      </section>

      <section class="action-strip glass">
        <div class="control-card control-card--center">
          <button id="spinBtn" class="primary-btn primary-btn--big">Girar ruleta</button>
          <button id="openKeyboardBtn" class="ghost-btn">Abrir teclado</button>
          <button id="solveBtn" class="ghost-btn">Resolver panel</button>
        </div>
      </section>
    </section>
  </main>

  <div id="wheelModal" class="overlay">
    <div class="overlay-card overlay-card--wheel glass">
      <div class="overlay-head">
        <h2>Ruleta</h2>
        <button id="closeWheelBtn" class="ghost-btn">Cerrar</button>
      </div>
      <canvas id="wheel" width="420" height="420" aria-label="Ruleta"></canvas>
      <button id="wheelSpinBtn" class="primary-btn primary-btn--big">Girar</button>
    </div>
  </div>

  <div id="keyboardModal" class="overlay">
    <div class="overlay-card overlay-card--keyboard glass">
      <div class="overlay-head">
        <h2>Elige letra</h2>
        <button id="closeKeyboardBtn" class="ghost-btn">Cerrar</button>
      </div>
      <div id="keyboardGrid" class="keyboard-grid"></div>
    </div>
  </div>

  <div id="resultSplash" class="result-splash">
    <div id="resultSplashText" class="result-splash__text">200</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
